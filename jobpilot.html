<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobPilot — Live Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #08090d;
      --bg-card: #111319;
      --bg-elevated: #181b24;
      --border: #1f2330;
      --text: #e2e4ea;
      --text-muted: #7a7f94;
      --text-dim: #484d62;
      --red: #ff4757;
      --blue: #3b82f6;
      --green: #10b981;
      --yellow: #f59e0b;
      --purple: #8b5cf6;
      --orange: #f97316;
      --cyan: #06b6d4;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      padding: 20px;
      line-height: 1.5;
    }

    .container { max-width: 900px; margin: 0 auto; }

    /* Header */
    .header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 32px; flex-wrap: wrap; gap: 12px; }
    .header h1 { font-size: 32px; font-weight: 900; letter-spacing: -0.03em; }
    .header h1 span { background: linear-gradient(135deg, var(--red), var(--orange)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .header .meta { font-size: 12px; color: var(--text-dim); font-family: 'IBM Plex Mono', monospace; }
    .header .actions { display: flex; gap: 8px; }

    .btn {
      padding: 8px 16px; border: none; border-radius: 8px; font-weight: 600;
      cursor: pointer; font-size: 13px; font-family: inherit; transition: all 0.15s;
    }
    .btn-primary { background: var(--red); color: #fff; }
    .btn-primary:hover { filter: brightness(1.15); transform: translateY(-1px); }
    .btn-ghost { background: var(--bg-elevated); color: var(--text-muted); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--text-dim); color: var(--text); }

    /* Loading */
    .loading { text-align: center; padding: 80px 20px; }
    .loading .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--red); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { color: var(--text-dim); font-size: 14px; }

    /* Error */
    .error { text-align: center; padding: 60px 20px; }
    .error .icon { font-size: 40px; margin-bottom: 12px; }
    .error p { color: var(--text-muted); font-size: 14px; max-width: 400px; margin: 0 auto; }
    .error .btn { margin-top: 16px; }

    /* Stats */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 28px; }
    .stat {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
      padding: 16px 18px; position: relative; overflow: hidden;
    }
    .stat::after {
      content: ''; position: absolute; top: 0; right: 0; width: 60px; height: 60px;
      border-radius: 50%; filter: blur(30px); opacity: 0.15;
    }
    .stat.red::after { background: var(--red); }
    .stat.blue::after { background: var(--blue); }
    .stat.green::after { background: var(--green); }
    .stat.yellow::after { background: var(--yellow); }
    .stat.purple::after { background: var(--purple); }
    .stat .value { font-size: 28px; font-weight: 800; font-family: 'IBM Plex Mono', monospace; letter-spacing: -0.02em; }
    .stat .label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; margin-top: 2px; }

    /* Toolbar */
    .toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .search {
      flex: 1; min-width: 180px; padding: 10px 14px; background: var(--bg-card);
      border: 1px solid var(--border); border-radius: 10px; color: var(--text);
      font-size: 14px; outline: none; font-family: inherit;
    }
    .search:focus { border-color: var(--blue); }
    .search::placeholder { color: var(--text-dim); }
    .filter-pills { display: flex; gap: 4px; flex-wrap: wrap; }
    .pill {
      padding: 7px 12px; font-size: 11px; font-weight: 600; background: var(--bg-card);
      color: var(--text-dim); border: 1px solid var(--border); border-radius: 20px;
      cursor: pointer; transition: all 0.15s; font-family: inherit; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .pill.active { background: rgba(255,71,87,0.12); color: var(--red); border-color: rgba(255,71,87,0.3); }
    .pill:hover:not(.active) { border-color: var(--text-dim); }

    /* Job Cards */
    .job-list { display: flex; flex-direction: column; gap: 8px; }
    .job {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
      padding: 16px 20px; cursor: pointer; transition: all 0.15s;
      border-left: 3px solid var(--blue);
    }
    .job:hover { border-color: rgba(255,255,255,0.08); background: var(--bg-elevated); }
    .job.status-Discovered { border-left-color: var(--blue); }
    .job.status-Screened { border-left-color: var(--purple); }
    .job.status-Applied { border-left-color: var(--green); }
    .job.status-Interview { border-left-color: var(--yellow); }
    .job.status-Offer { border-left-color: var(--red); }
    .job.status-Rejected { border-left-color: #555; }
    .job.status-Ghosted { border-left-color: #444; }

    .job-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .job-info { flex: 1; min-width: 0; }
    .job-title { font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .job-company { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
    .job-right { text-align: right; flex-shrink: 0; }
    .job-score { font-size: 18px; font-weight: 800; font-family: 'IBM Plex Mono', monospace; }
    .job-score.high { color: var(--green); }
    .job-score.mid { color: var(--yellow); }
    .job-score.low { color: var(--text-dim); }

    .badge {
      display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 12px;
      font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
    }
    .badge-Discovered { background: rgba(59,130,246,0.12); color: var(--blue); }
    .badge-Screened { background: rgba(139,92,246,0.12); color: var(--purple); }
    .badge-Applied { background: rgba(16,185,129,0.12); color: var(--green); }
    .badge-Interview { background: rgba(245,158,11,0.12); color: var(--yellow); }
    .badge-Offer { background: rgba(255,71,87,0.12); color: var(--red); }
    .badge-Rejected { background: rgba(85,85,85,0.12); color: #888; }
    .badge-Ghosted { background: rgba(68,68,68,0.12); color: #666; }

    /* Expanded */
    .job-expanded { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); animation: fadeIn 0.2s ease; }
    .job-details { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 13px; }
    .job-details .lbl { color: var(--text-dim); }
    .job-details .val { color: var(--text-muted); }
    .job-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 10px; }
    .tag { font-size: 10px; padding: 2px 8px; border-radius: 4px; background: var(--bg-elevated); color: var(--text-dim); border: 1px solid var(--border); font-family: 'IBM Plex Mono', monospace; }
    .job-link { display: inline-block; margin-top: 10px; font-size: 12px; color: var(--blue); text-decoration: none; font-weight: 600; }
    .job-link:hover { text-decoration: underline; }
    .job-notes { margin-top: 8px; font-size: 12px; color: var(--text-dim); font-style: italic; }

    /* Cover Letter toggle */
    .cl-toggle { margin-top: 10px; font-size: 12px; color: var(--orange); cursor: pointer; font-weight: 600; }
    .cl-content { margin-top: 8px; padding: 12px; background: var(--bg); border-radius: 8px; font-size: 12px; line-height: 1.7; color: var(--text-muted); white-space: pre-wrap; max-height: 300px; overflow-y: auto; }

    /* Empty */
    .empty { text-align: center; padding: 60px; color: var(--text-dim); }

    /* Footer */
    .footer { text-align: center; margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border); }
    .footer p { font-size: 11px; color: var(--text-dim); font-family: 'IBM Plex Mono', monospace; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .job { animation: fadeIn 0.2s ease; }

    @media (max-width: 600px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .job-details { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div class="loading">
      <div class="spinner"></div>
      <p>Connecting to Notion...</p>
    </div>
  </div>

  <script>
    // ============================================
    // JobPilot Live Dashboard
    // Pulls data from Notion via n8n webhook
    // ============================================

    // IMPORTANT: Replace this URL with your actual n8n webhook URL after importing the API workflow
    const API_URL = 'https://hholaitan.app.n8n.cloud/webhook/jobpilot-data';

    const STATUSES = ['All', 'Discovered', 'Screened', 'Applied', 'Interview', 'Offer', 'Rejected', 'Ghosted'];

    let state = {
      jobs: [],
      stats: {},
      filter: 'All',
      search: '',
      expandedId: null,
      showCoverLetter: null,
      loading: true,
      error: null,
      lastFetched: null,
    };

    // ============================================
    // Data Fetching
    // ============================================
    async function fetchJobs() {
      state.loading = true;
      state.error = null;
      render();

      try {
        const resp = await fetch(API_URL);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        state.jobs = data.jobs || [];
        state.stats = data.stats || {};
        state.lastFetched = new Date().toLocaleTimeString();
        state.loading = false;
      } catch (err) {
        state.error = err.message;
        state.loading = false;
      }
      render();
    }

    // ============================================
    // Helpers
    // ============================================
    function esc(str) { const d = document.createElement('div'); d.textContent = str || ''; return d.innerHTML; }
    function scoreClass(s) { return s >= 50 ? 'high' : s >= 30 ? 'mid' : 'low'; }
    function daysSince(dateStr) { if (!dateStr) return '—'; return Math.max(0, Math.floor((Date.now() - new Date(dateStr).getTime()) / 86400000)) + 'd'; }

    // ============================================
    // Render
    // ============================================
    function render() {
      const app = document.getElementById('app');

      if (state.loading) {
        app.innerHTML = '<div class="loading"><div class="spinner"></div><p>Connecting to Notion...</p></div>';
        return;
      }

      if (state.error) {
        app.innerHTML = `
          <div class="error">
            <div class="icon">⚡</div>
            <p>Couldn't load data: ${esc(state.error)}</p>
            <p style="margin-top:8px;font-size:12px;color:var(--text-dim)">Make sure the JobPilot API workflow is active in n8n and the webhook URL is correct.</p>
            <button class="btn btn-primary" onclick="fetchJobs()" style="margin-top:16px">Retry</button>
          </div>
        `;
        return;
      }

      const jobs = state.jobs;
      const filtered = jobs
        .filter(j => state.filter === 'All' || j.status === state.filter)
        .filter(j => {
          if (!state.search) return true;
          const s = state.search.toLowerCase();
          return (j.title||'').toLowerCase().includes(s) || (j.company||'').toLowerCase().includes(s) || (j.notes||'').toLowerCase().includes(s);
        });

      const st = state.stats;

      app.innerHTML = `
        <div class="header">
          <div>
            <h1><span>JobPilot</span></h1>
            <div class="meta">Live from Notion ${state.lastFetched ? '· Updated ' + state.lastFetched : ''} · ${jobs.length} tracked</div>
          </div>
          <div class="actions">
            <button class="btn btn-ghost" onclick="fetchJobs()">Refresh</button>
          </div>
        </div>

        <div class="stats">
          <div class="stat red"><div class="value">${st.total || 0}</div><div class="label">Total</div></div>
          <div class="stat blue"><div class="value">${st.discovered || 0}</div><div class="label">Discovered</div></div>
          <div class="stat green"><div class="value">${st.applied || 0}</div><div class="label">Applied</div></div>
          <div class="stat yellow"><div class="value">${st.interview || 0}</div><div class="label">Interview</div></div>
          <div class="stat purple"><div class="value">${st.offer || 0}</div><div class="label">Offers</div></div>
        </div>

        <div class="toolbar">
          <input class="search" placeholder="Search jobs, companies..." value="${esc(state.search)}" oninput="updateSearch(this.value)" />
          <div class="filter-pills">
            ${STATUSES.map(s => `
              <button class="pill ${state.filter === s ? 'active' : ''}" onclick="setFilter('${s}')">${s}</button>
            `).join('')}
          </div>
        </div>

        <div class="job-list">
          ${filtered.length === 0 ? `
            <div class="empty">No jobs ${state.filter !== 'All' ? 'with status "' + state.filter + '"' : 'found'}</div>
          ` : filtered.map(j => renderJob(j)).join('')}
        </div>

        <div class="footer">
          <p>JobPilot v3 — Auto Search, Apply & Track · Powered by n8n + Notion</p>
        </div>
      `;
    }

    function renderJob(j) {
      const expanded = state.expandedId === j.id;
      const showCL = state.showCoverLetter === j.id;

      return `
        <div class="job status-${j.status}" onclick="toggleExpand('${j.id}')">
          <div class="job-top">
            <div class="job-info">
              <div class="job-title">${esc(j.title)} <span class="badge badge-${j.status}">${j.status}</span></div>
              <div class="job-company">${esc(j.company)} · ${esc(j.source)} · ${daysSince(j.createdAt)}</div>
            </div>
            <div class="job-right">
              <div class="job-score ${scoreClass(j.matchScore)}">${j.matchScore}%</div>
            </div>
          </div>
          ${expanded ? `
            <div class="job-expanded">
              <div class="job-details">
                <div><span class="lbl">Salary:</span> <span class="val">${esc(j.salary || '—')}</span></div>
                <div><span class="lbl">Location:</span> <span class="val">${esc(j.location || '—')}</span></div>
                <div><span class="lbl">Applied via:</span> <span class="val">${esc(j.appliedVia || '—')}</span></div>
                <div><span class="lbl">Applied:</span> <span class="val">${esc(j.appliedDate || '—')}</span></div>
              </div>
              ${j.tags && j.tags.length ? `<div class="job-tags">${j.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div>` : ''}
              ${j.notes ? `<div class="job-notes">${esc(j.notes)}</div>` : ''}
              ${j.url ? `<a class="job-link" href="${esc(j.url)}" target="_blank" onclick="event.stopPropagation()">View Posting →</a>` : ''}
              ${j.coverLetter ? `
                <div class="cl-toggle" onclick="event.stopPropagation(); toggleCoverLetter('${j.id}')">${showCL ? '▾ Hide Cover Letter' : '▸ View Cover Letter'}</div>
                ${showCL ? `<div class="cl-content">${esc(j.coverLetter)}</div>` : ''}
              ` : ''}
            </div>
          ` : ''}
        </div>
      `;
    }

    // ============================================
    // Actions
    // ============================================
    function updateSearch(val) { state.search = val; render(); }
    function setFilter(f) { state.filter = f; render(); }
    function toggleExpand(id) { state.expandedId = state.expandedId === id ? null : id; state.showCoverLetter = null; render(); }
    function toggleCoverLetter(id) { state.showCoverLetter = state.showCoverLetter === id ? null : id; render(); }

    // ============================================
    // Init — auto-refresh every 5 minutes
    // ============================================
    fetchJobs();
    setInterval(fetchJobs, 5 * 60 * 1000);
  </script>
</body>
</html>
