<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobPilot — Application Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep: #0a0a1a;
      --bg-card: #16213e;
      --bg-input: #0a0a1a;
      --border-primary: #1e3a5f;
      --text-bright: #e6f1ff;
      --text-muted: #8892b0;
      --text-dim: #5a6a8a;
      --accent-red: #e94560;
      --accent-blue: #56a0f5;
      --accent-yellow: #f5a623;
      --accent-green: #00e676;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(180deg, var(--bg-deep) 0%, #0d1117 50%, var(--bg-deep) 100%);
      color: var(--text-bright);
      font-family: 'Inter', -apple-system, sans-serif;
      padding: 24px 20px;
      line-height: 1.5;
    }

    .container { max-width: 820px; margin: 0 auto; }

    /* Header */
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 12px; }
    .header h1 {
      font-size: 28px; font-weight: 800; font-family: 'Space Grotesk', sans-serif;
      background: linear-gradient(135deg, var(--accent-red), var(--accent-blue));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .header .subtitle { font-size: 13px; color: var(--text-dim); margin-top: 2px; }
    .header-actions { display: flex; gap: 8px; }

    /* Buttons */
    .btn {
      padding: 10px 20px; border: none; border-radius: 10px; font-weight: 700;
      cursor: pointer; font-size: 14px; transition: all 0.2s; font-family: inherit;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent-red), #c62a47);
      color: #fff; box-shadow: 0 4px 12px rgba(233,69,96,0.3); letter-spacing: 0.02em;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(233,69,96,0.4); }
    .btn-ghost { background: transparent; color: var(--text-dim); border: 1px solid rgba(30,58,95,0.2); padding: 10px 14px; font-size: 12px; }
    .btn-sm { padding: 6px 14px; font-size: 12px; border-radius: 6px; }
    .btn-blue { background: #0f3460; color: var(--accent-blue); }
    .btn-green { background: rgba(0,230,118,0.13); color: var(--accent-green); }
    .btn-danger { background: transparent; color: var(--accent-red); border: 1px solid rgba(233,69,96,0.2); }

    /* Stats Grid */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
    @media (max-width: 600px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
    .stat-card {
      background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-deep) 100%);
      border: 1px solid rgba(255,255,255,0.04); border-radius: 14px;
      padding: 20px 24px; position: relative; overflow: hidden;
    }
    .stat-card .icon { position: absolute; top: 12px; right: 16px; font-size: 28px; opacity: 0.15; }
    .stat-card .value {
      font-size: 32px; font-weight: 800; font-family: 'JetBrains Mono', monospace; letter-spacing: -0.02em;
    }
    .stat-card .label {
      font-size: 12px; color: var(--text-muted); margin-top: 4px;
      text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600;
    }

    /* Search + Filters */
    .toolbar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .search-input {
      flex: 1; min-width: 200px; padding: 10px 16px; background: var(--bg-card);
      border: 1px solid var(--border-primary); border-radius: 10px; color: var(--text-bright);
      font-size: 14px; outline: none; font-family: inherit;
    }
    .search-input:focus { border-color: var(--accent-blue); }
    .search-input::placeholder { color: var(--text-dim); }
    .filters { display: flex; gap: 4px; flex-wrap: wrap; }
    .filter-btn {
      padding: 8px 14px; font-size: 12px; font-weight: 600; background: transparent;
      color: var(--text-dim); border: 1px solid rgba(30,58,95,0.2); border-radius: 8px;
      cursor: pointer; transition: all 0.2s; font-family: inherit;
    }
    .filter-btn.active { background: rgba(233,69,96,0.13); color: var(--accent-red); border-color: rgba(233,69,96,0.27); }
    .filter-btn .count { opacity: 0.6; }

    /* Job Cards */
    .job-card {
      border: 1px solid rgba(255,255,255,0.05); border-left: 3px solid var(--accent-blue);
      border-radius: 12px; padding: 16px 20px; margin-bottom: 10px;
      cursor: pointer; transition: all 0.2s;
    }
    .job-card:hover { border-color: rgba(255,255,255,0.12); }
    .job-card-header { display: flex; align-items: center; justify-content: space-between; }
    .job-card-main { flex: 1; }
    .job-card-company { font-size: 16px; font-weight: 700; font-family: 'Space Grotesk', sans-serif; }
    .job-card-status {
      display: inline-block; font-size: 11px; padding: 2px 10px; border-radius: 20px;
      font-weight: 600; letter-spacing: 0.04em; margin-left: 10px; vertical-align: middle;
    }
    .job-card-role { font-size: 14px; color: var(--text-muted); margin-top: 4px; }
    .job-card-meta { text-align: right; }
    .job-card-days { font-size: 12px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }
    .job-card-salary { font-size: 12px; color: var(--accent-blue); margin-top: 2px; }

    .job-card-expanded {
      margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(30,58,95,0.2);
    }
    .job-card-details { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 13px; }
    .job-card-details .lbl { color: var(--text-dim); }
    .job-card-details .val { color: #ccd6f6; }
    .job-card-notes { margin-top: 10px; font-size: 13px; color: var(--text-muted); font-style: italic; line-height: 1.5; }
    .job-card-link { display: inline-block; margin-top: 10px; font-size: 12px; color: var(--accent-blue); text-decoration: none; }
    .job-card-link:hover { text-decoration: underline; }
    .job-card-actions { display: flex; gap: 8px; margin-top: 12px; }

    /* Empty State */
    .empty-state { text-align: center; padding: 60px; color: var(--text-dim); }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex;
      align-items: center; justify-content: center; z-index: 999; backdrop-filter: blur(4px);
    }
    .modal {
      background: var(--bg-card); border-radius: 16px; padding: 32px; width: 90%; max-width: 520px;
      border: 1px solid #0f3460; box-shadow: 0 24px 48px rgba(0,0,0,0.4);
    }
    .modal h3 { margin-bottom: 20px; font-size: 20px; font-family: 'Space Grotesk', sans-serif; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 500px) { .form-grid { grid-template-columns: 1fr; } }
    .form-group label {
      display: block; font-size: 11px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 10px 12px; background: var(--bg-input); border: 1px solid var(--border-primary);
      border-radius: 8px; color: var(--text-bright); font-size: 14px; outline: none;
      font-family: 'JetBrains Mono', monospace;
    }
    .form-group textarea { resize: vertical; font-family: 'JetBrains Mono', monospace; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent-blue); }
    .form-group.full { grid-column: 1 / -1; }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .modal-actions .btn-primary { flex: 1; padding: 12px; }

    /* Footer */
    .footer { text-align: center; margin-top: 40px; padding-top: 20px; border-top: 1px solid rgba(30,58,95,0.13); }
    .footer p { font-size: 12px; color: #3a4a6a; }

    /* Status-specific colors */
    .status-Saved { background: rgba(233,69,96,0.1); color: var(--accent-red); }
    .status-Applied { background: rgba(86,160,245,0.1); color: var(--accent-blue); }
    .status-Interview { background: rgba(245,166,35,0.1); color: var(--accent-yellow); }
    .status-Offer { background: rgba(0,230,118,0.13); color: var(--accent-green); }
    .status-Rejected { background: rgba(85,85,85,0.1); color: #888; }
    .status-Ghosted { background: rgba(68,68,68,0.1); color: #666; }

    .border-Saved { border-left-color: var(--accent-red); background: linear-gradient(135deg, rgba(233,69,96,0.05), transparent); }
    .border-Applied { border-left-color: #0f3460; background: linear-gradient(135deg, rgba(86,160,245,0.05), transparent); }
    .border-Interview { border-left-color: var(--accent-yellow); background: linear-gradient(135deg, rgba(245,166,35,0.05), transparent); }
    .border-Offer { border-left-color: var(--accent-green); background: linear-gradient(135deg, rgba(0,230,118,0.06), transparent); }
    .border-Rejected { border-left-color: #555; }
    .border-Ghosted { border-left-color: #444; }

    /* Export/Import buttons */
    .data-actions { display: flex; gap: 6px; }
    .data-actions .btn-ghost { font-size: 11px; padding: 6px 10px; }

    /* Animations */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .job-card { animation: fadeIn 0.25s ease; }

    /* Cover Letter Modal */
    .cl-modal { max-width: 640px; max-height: 90vh; overflow-y: auto; }
    .cl-output {
      background: var(--bg-input); border: 1px solid var(--border-primary); border-radius: 10px;
      padding: 20px; margin-top: 16px; font-size: 14px; line-height: 1.7; color: var(--text-bright);
      white-space: pre-wrap; font-family: 'Inter', sans-serif; min-height: 200px;
    }
    .cl-output.loading { color: var(--text-dim); text-align: center; padding: 40px; }
    .cl-actions-bar { display: flex; gap: 8px; margin-top: 12px; }
    .tab-bar { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 2px solid var(--border-primary); }
    .tab-btn {
      padding: 10px 20px; background: transparent; border: none; color: var(--text-dim);
      font-weight: 600; font-size: 13px; cursor: pointer; font-family: inherit;
      border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s;
    }
    .tab-btn.active { color: var(--accent-red); border-bottom-color: var(--accent-red); }
  </style>
</head>
<body>
  <div class="container" id="app"></div>

  <script>
    // ============================================
    // JobPilot — Standalone Application Tracker
    // ============================================

    const STATUS_FLOW = ["Saved", "Applied", "Interview", "Offer", "Rejected", "Ghosted"];
    const STORAGE_KEY = "jobpilot-data";

    const sampleJobs = [
      { id: 1, company: "Acme Corp", role: "Fullstack Developer", status: "Applied", url: "https://example.com", date: "2026-03-01", salary: "$80k-$120k", notes: "Python + React stack", source: "LinkedIn" },
      { id: 2, company: "TechFlow", role: "Python Engineer", status: "Interview", url: "https://example.com", date: "2026-02-28", salary: "$90k-$130k", notes: "2nd round scheduled", source: "RemoteOK" },
      { id: 3, company: "AutomateCo", role: "n8n Automation Dev", status: "Saved", url: "https://example.com", date: "2026-03-05", salary: "€60k-€80k", notes: "Perfect fit - 170+ workflows", source: "Indeed" },
    ];

    // State
    let state = {
      jobs: [],
      filter: "All",
      search: "",
      showModal: false,
      editingId: null,
      expandedId: null,
    };

    function loadJobs() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        state.jobs = saved ? JSON.parse(saved) : [...sampleJobs];
      } catch { state.jobs = [...sampleJobs]; }
    }

    function saveJobs() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.jobs)); } catch {}
    }

    function daysSince(dateStr) {
      return Math.max(0, Math.floor((Date.now() - new Date(dateStr).getTime()) / 86400000));
    }

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }

    // ============================================
    // Render
    // ============================================
    function render() {
      const app = document.getElementById('app');
      const jobs = state.jobs;
      const filtered = jobs
        .filter(j => state.filter === "All" || j.status === state.filter)
        .filter(j => {
          if (!state.search) return true;
          const s = state.search.toLowerCase();
          return (j.company||'').toLowerCase().includes(s) || (j.role||'').toLowerCase().includes(s) || (j.notes||'').toLowerCase().includes(s);
        });

      const stats = {
        total: jobs.length,
        active: jobs.filter(j => !["Rejected","Ghosted"].includes(j.status)).length,
        interviews: jobs.filter(j => j.status === "Interview").length,
        offers: jobs.filter(j => j.status === "Offer").length,
      };

      app.innerHTML = `
        <div class="header">
          <div>
            <h1>JobPilot</h1>
            <div class="subtitle">Application Tracker & Pipeline</div>
          </div>
          <div class="header-actions">
            <div class="data-actions">
              <button class="btn btn-ghost" onclick="exportData()">Export</button>
              <button class="btn btn-ghost" onclick="document.getElementById('import-file').click()">Import</button>
              <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)" />
            </div>
            <button class="btn btn-ghost" onclick="resetData()">Reset</button>
            <button class="btn btn-primary" onclick="openAddModal()">+ Add Job</button>
          </div>
        </div>

        <div class="stats-grid">
          <div class="stat-card"><span class="icon">📋</span><div class="value" style="color:var(--accent-red)">${stats.total}</div><div class="label">Total</div></div>
          <div class="stat-card"><span class="icon">🚀</span><div class="value" style="color:var(--accent-blue)">${stats.active}</div><div class="label">Active</div></div>
          <div class="stat-card"><span class="icon">🎯</span><div class="value" style="color:var(--accent-yellow)">${stats.interviews}</div><div class="label">Interviews</div></div>
          <div class="stat-card"><span class="icon">🏆</span><div class="value" style="color:var(--accent-green)">${stats.offers}</div><div class="label">Offers</div></div>
        </div>

        <div class="toolbar">
          <input class="search-input" placeholder="Search companies, roles..." value="${esc(state.search)}" oninput="updateSearch(this.value)" />
          <div class="filters">
            ${["All", ...STATUS_FLOW].map(s => `
              <button class="filter-btn ${state.filter === s ? 'active' : ''}" onclick="setFilter('${s}')">
                ${s} ${s !== 'All' ? `<span class="count">(${jobs.filter(j => j.status === s).length})</span>` : ''}
              </button>
            `).join('')}
          </div>
        </div>

        <div class="job-list">
          ${filtered.length === 0 ? `
            <div class="empty-state">
              <div class="icon">📭</div>
              <div>No applications ${state.filter !== 'All' ? `with status "${state.filter}"` : 'found'}</div>
            </div>
          ` : filtered.map(j => renderJobCard(j)).join('')}
        </div>

        <div class="footer">
          <p>JobPilot — ${jobs.length} applications tracked • Data saved in browser</p>
        </div>

        ${state.showModal ? renderModal() : ''}
        ${clState.showModal ? renderCoverLetterModal() : ''}
      `;
    }

    function renderJobCard(job) {
      const days = daysSince(job.date);
      const expanded = state.expandedId === job.id;
      const editing = state.editingId === job.id;
      const nextStatus = STATUS_FLOW[STATUS_FLOW.indexOf(job.status) + 1];
      const canAdvance = STATUS_FLOW.indexOf(job.status) < 3;

      if (editing) {
        return `
          <div class="job-card border-${job.status}">
            <div class="form-grid">
              ${['company','role','salary','url','source'].map(f => `
                <div class="form-group">
                  <label>${f}</label>
                  <input id="edit-${f}" value="${esc(job[f]||'')}" />
                </div>
              `).join('')}
              <div class="form-group">
                <label>Status</label>
                <select id="edit-status">${STATUS_FLOW.map(s => `<option ${s===job.status?'selected':''}>${s}</option>`).join('')}</select>
              </div>
            </div>
            <div class="form-group full" style="margin-top:12px">
              <label>Notes</label>
              <textarea id="edit-notes" rows="2">${esc(job.notes||'')}</textarea>
            </div>
            <div class="job-card-actions" style="margin-top:16px">
              <button class="btn btn-sm btn-green" onclick="saveEdit(${job.id})" style="background:var(--accent-green);color:#0a0a1a;font-weight:700">Save</button>
              <button class="btn btn-sm btn-ghost" onclick="cancelEdit()">Cancel</button>
              <button class="btn btn-sm btn-danger" onclick="deleteJob(${job.id})" style="margin-left:auto">Delete</button>
            </div>
          </div>
        `;
      }

      return `
        <div class="job-card border-${job.status}" onclick="toggleExpand(${job.id})">
          <div class="job-card-header">
            <div class="job-card-main">
              <div>
                <span class="job-card-company">${esc(job.company)}</span>
                <span class="job-card-status status-${job.status}">${job.status}</span>
              </div>
              <div class="job-card-role">${esc(job.role)}</div>
            </div>
            <div class="job-card-meta">
              <div class="job-card-days">${days}d ago</div>
              ${job.salary ? `<div class="job-card-salary">${esc(job.salary)}</div>` : ''}
            </div>
          </div>
          ${expanded ? `
            <div class="job-card-expanded">
              <div class="job-card-details">
                <div><span class="lbl">Source:</span> <span class="val">${esc(job.source||'—')}</span></div>
                <div><span class="lbl">Applied:</span> <span class="val">${esc(job.date)}</span></div>
              </div>
              ${job.notes ? `<div class="job-card-notes">${esc(job.notes)}</div>` : ''}
              ${job.url ? `<a class="job-card-link" href="${esc(job.url)}" target="_blank" onclick="event.stopPropagation()">View Posting →</a>` : ''}
              <div class="job-card-actions">
                <button class="btn btn-sm btn-blue" onclick="event.stopPropagation(); startEdit(${job.id})">Edit</button>
                ${canAdvance ? `<button class="btn btn-sm btn-green" onclick="event.stopPropagation(); advanceStatus(${job.id})">→ ${nextStatus}</button>` : ''}
                <button class="btn btn-sm" onclick="openCoverLetter(${job.id})" style="background:rgba(245,166,35,0.13);color:var(--accent-yellow)">Cover Letter</button>
              </div>
            </div>
          ` : ''}
        </div>
      `;
    }

    function renderModal() {
      return `
        <div class="modal-overlay" onclick="closeModal()">
          <div class="modal" onclick="event.stopPropagation()">
            <h3>Add Application</h3>
            <div class="form-grid">
              <div class="form-group"><label>Company *</label><input id="add-company" placeholder="Acme Corp" /></div>
              <div class="form-group"><label>Role *</label><input id="add-role" placeholder="Fullstack Developer" /></div>
              <div class="form-group"><label>Salary Range</label><input id="add-salary" placeholder="$80k-$120k" /></div>
              <div class="form-group"><label>Source</label><input id="add-source" placeholder="LinkedIn, RemoteOK..." /></div>
              <div class="form-group"><label>Job URL</label><input id="add-url" placeholder="https://..." /></div>
              <div class="form-group"><label>Date</label><input id="add-date" type="date" value="${new Date().toISOString().split('T')[0]}" /></div>
            </div>
            <div class="form-group full" style="margin-top:12px">
              <label>Notes</label>
              <textarea id="add-notes" rows="2" placeholder="Tech stack, interview notes..."></textarea>
            </div>
            <div class="modal-actions">
              <button class="btn btn-primary" onclick="addJob()">Add Application</button>
              <button class="btn btn-ghost" onclick="closeModal()" style="padding:12px 24px">Cancel</button>
            </div>
          </div>
        </div>
      `;
    }

    // ============================================
    // Actions
    // ============================================
    function updateSearch(val) { state.search = val; render(); }
    function setFilter(f) { state.filter = f; render(); }
    function toggleExpand(id) { state.expandedId = state.expandedId === id ? null : id; state.editingId = null; render(); }

    function openAddModal() { state.showModal = true; render(); }
    function closeModal() { state.showModal = false; render(); }

    function addJob() {
      const company = document.getElementById('add-company').value.trim();
      const role = document.getElementById('add-role').value.trim();
      if (!company || !role) return;
      state.jobs.unshift({
        id: Date.now(),
        company,
        role,
        status: "Saved",
        salary: document.getElementById('add-salary').value.trim(),
        source: document.getElementById('add-source').value.trim(),
        url: document.getElementById('add-url').value.trim(),
        date: document.getElementById('add-date').value,
        notes: document.getElementById('add-notes').value.trim(),
      });
      saveJobs(); closeModal();
    }

    function startEdit(id) { state.editingId = id; state.expandedId = id; render(); }
    function cancelEdit() { state.editingId = null; render(); }

    function saveEdit(id) {
      const job = state.jobs.find(j => j.id === id);
      if (!job) return;
      job.company = document.getElementById('edit-company').value.trim();
      job.role = document.getElementById('edit-role').value.trim();
      job.salary = document.getElementById('edit-salary').value.trim();
      job.url = document.getElementById('edit-url').value.trim();
      job.source = document.getElementById('edit-source').value.trim();
      job.status = document.getElementById('edit-status').value;
      job.notes = document.getElementById('edit-notes').value.trim();
      state.editingId = null;
      saveJobs(); render();
    }

    function advanceStatus(id) {
      const job = state.jobs.find(j => j.id === id);
      if (!job) return;
      const idx = STATUS_FLOW.indexOf(job.status);
      if (idx < STATUS_FLOW.length - 1) job.status = STATUS_FLOW[idx + 1];
      saveJobs(); render();
    }

    function deleteJob(id) {
      if (!confirm('Delete this application?')) return;
      state.jobs = state.jobs.filter(j => j.id !== id);
      state.editingId = null; state.expandedId = null;
      saveJobs(); render();
    }

    function resetData() {
      if (!confirm('Reset all data to sample entries? This cannot be undone.')) return;
      state.jobs = [...sampleJobs];
      state.editingId = null; state.expandedId = null;
      saveJobs(); render();
    }

    function exportData() {
      const blob = new Blob([JSON.stringify(state.jobs, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `jobpilot-export-${new Date().toISOString().split('T')[0]}.json`;
      a.click(); URL.revokeObjectURL(a.href);
    }

    function importData(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = JSON.parse(e.target.result);
          if (Array.isArray(data)) {
            state.jobs = data;
            saveJobs(); render();
            alert(`Imported ${data.length} applications.`);
          }
        } catch { alert('Invalid JSON file.'); }
      };
      reader.readAsText(file);
      event.target.value = '';
    }


    // ============================================
    // Cover Letter Generator
    // ============================================
    let clState = { showModal: false, jobId: null, output: '', loading: false, tab: 'tracker' };

    function openCoverLetter(id) {
      event && event.stopPropagation();
      clState.showModal = true;
      clState.jobId = id;
      clState.output = '';
      clState.loading = false;
      render();
    }

    function closeCoverLetter() {
      clState.showModal = false;
      clState.output = '';
      render();
    }

    async function generateCoverLetter() {
      const job = state.jobs.find(j => j.id === clState.jobId);
      if (!job) return;
      
      const tone = document.getElementById('cl-tone')?.value || 'Professional';
      const highlights = document.getElementById('cl-highlights')?.value || '';
      
      clState.loading = true;
      clState.output = '';
      render();

      const prompt = `Write a concise, compelling cover letter for the following job application. The tone should be ${tone}.

Applicant: Olaitan Hammed
- Fullstack Developer (React, Next.js, Node.js, Python, Flask, Django, FastAPI)
- n8n Automation Engineer with 170+ workflows across 24 industries
- Civil & Environmental Engineering student at University of Lagos
- Projects: StructSolve (structural analysis app), QuranShazam (AI audio recognition), Rainfall-Runoff Forecasting System
- Based in Lagos, Nigeria

Job Details:
- Company: ${job.company}
- Role: ${job.role}
- Salary: ${job.salary || 'Not specified'}
- Source: ${job.source || 'Not specified'}
- Notes/Requirements: ${job.notes || 'None'}
${highlights ? '- Additional highlights to emphasize: ' + highlights : ''}

Rules:
- Keep it under 300 words
- No generic filler. Every sentence must add value.
- Open with a hook, not "I am writing to apply"
- Show how the applicant's specific skills map to the role
- Close with confidence, not desperation
- Do NOT include [brackets] or placeholder text`;

      try {
        const resp = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1000,
            messages: [{ role: 'user', content: prompt }]
          })
        });
        const data = await resp.json();
        clState.output = data.content?.map(c => c.text || '').join('\n') || 'Error generating letter.';
      } catch (err) {
        clState.output = 'Error: ' + err.message;
      }
      
      clState.loading = false;
      render();
    }

    function copyCoverLetter() {
      navigator.clipboard.writeText(clState.output).then(() => {
        const btn = document.getElementById('cl-copy-btn');
        if (btn) { btn.textContent = 'Copied!'; setTimeout(() => { btn.textContent = 'Copy'; }, 1500); }
      });
    }

    function renderCoverLetterModal() {
      const job = state.jobs.find(j => j.id === clState.jobId);
      if (!job) return '';
      return `
        <div class="modal-overlay" onclick="closeCoverLetter()">
          <div class="modal cl-modal" onclick="event.stopPropagation()">
            <h3>Cover Letter — ${esc(job.company)}</h3>
            <p style="color:var(--text-muted);font-size:13px;margin-bottom:16px">${esc(job.role)}</p>
            <div class="form-grid">
              <div class="form-group">
                <label>Tone</label>
                <select id="cl-tone">
                  <option>Professional</option>
                  <option>Conversational</option>
                  <option>Bold & Confident</option>
                  <option>Technical</option>
                </select>
              </div>
              <div class="form-group">
                <label>Extra Highlights</label>
                <input id="cl-highlights" placeholder="Specific skills to emphasize..." />
              </div>
            </div>
            <button class="btn btn-primary" onclick="generateCoverLetter()" style="margin-top:16px;width:100%" ${clState.loading ? 'disabled' : ''}>
              ${clState.loading ? 'Generating...' : 'Generate Cover Letter'}
            </button>
            ${clState.output ? `
              <div class="cl-output${clState.loading ? ' loading' : ''}">${clState.loading ? '⏳ Writing your cover letter...' : esc(clState.output)}</div>
              <div class="cl-actions-bar">
                <button id="cl-copy-btn" class="btn btn-sm btn-blue" onclick="copyCoverLetter()">Copy</button>
                <button class="btn btn-sm btn-ghost" onclick="closeCoverLetter()">Close</button>
              </div>
            ` : ''}
            ${!clState.output && !clState.loading ? '<button class="btn btn-ghost" onclick="closeCoverLetter()" style="margin-top:12px">Cancel</button>' : ''}
          </div>
        </div>
      `;
    }

    // ============================================
    // Init
    // ============================================
    loadJobs();
    render();
  </script>
</body>
</html>
